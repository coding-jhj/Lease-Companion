<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>슬기로운 계약생활 · 최소 MVP</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="hero">
    <p class="eyebrow">MINIMUM MVP</p>
    <h1>계약 전, 확인할 것을 놓치지 않도록</h1>
    <p>계약서와 등기사항증명서를 비교해 확인 질문과 다음 행동을 정리합니다.</p>
  </header>
  <main>
    <section class="panel" aria-labelledby="upload-title">
      <div class="step">1</div><div class="content">
        <h2 id="upload-title">문서 올리기</h2>
        <p class="hint">PDF·사진(jpg·png)을 올리세요. 텍스트 레이어가 있으면 그대로 읽고, 스캔·사진이면 OCR로 읽습니다. 개발 확인용 UTF-8 TXT도 지원합니다.</p>
        <div class="upload-grid">
          <label>계약서 <span>필수</span><input id="contract-file" type="file" accept=".pdf,.txt,.jpg,.jpeg,.png" required></label>
          <label>등기사항증명서 <span>필수</span><input id="registry-file" type="file" accept=".pdf,.txt,.jpg,.jpeg,.png" required></label>
        </div>
        <label class="force-ocr"><input id="force-ocr" type="checkbox"> OCR로 강제 읽기 <span class="warn">개발용 · 원문 이미지가 외부 API로 전송됩니다</span></label>
        <button id="extract-button" type="button">정보 추출하기</button>
      </div>
    </section>
    <section id="review-section" class="panel hidden" aria-labelledby="review-title">
      <div class="step">2</div><div class="content">
        <h2 id="review-title">추출값 확인·수정</h2>
        <p class="hint">문서 원문과 대조한 뒤 값을 고쳐주세요. 확인 전에는 분석할 수 없습니다.</p>
        <div id="review-fields"></div>
        <label class="confirm"><input id="confirm-check" type="checkbox"> 문서와 대조해 추출값을 확인했습니다.</label>
        <button id="analyze-button" type="button">규칙 분석하기</button>
      </div>
    </section>
    <section id="result-section" class="panel hidden" aria-labelledby="result-title">
      <div class="step">3</div><div class="content">
        <h2 id="result-title">확인 리포트</h2>
        <p id="disclaimer" class="notice"></p><div id="summary" class="summary"></div><div id="results"></div>
      </div>
    </section>
    <div id="status" class="status hidden" role="status" aria-live="polite"></div>
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
